# Example Docker config for mcp-guard
# Mount this file: -v ./mcp-guard.yaml:/etc/mcp-guard/config.yaml

auth:
  mode: api_key
  keys:
    - "sk-agent-1"

policies:
  max_spend_per_session: 10.00
  audit_log: /var/log/mcp-guard/audit.jsonl
  rate_limit:
    requests_per_minute: 60

servers:
  echo:
    command: python3
    args: ["-c", "import sys,json; [sys.stdout.write(json.dumps({'jsonrpc':'2.0','id':1,'result':{'tools':[]}})+'\\n') for _ in sys.stdin]"]